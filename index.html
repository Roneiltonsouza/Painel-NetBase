<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBase - Admin Panel</title>
    <style>
        :root { --primary: #800080; --bg: #0f0f0f; --card: #1a1a1a; --accent: #ff4500; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h3 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; width: 100%; color: white; background: #000; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: var(--accent); }
        .api-item { background: #252525; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; font-size: 0.8rem; border-left: 4px solid var(--primary); word-break: break-all; }
        #admin-content { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h3>NetBase Login</h3>
        <p>Acesso Restrito</p>
        <input type="password" id="secret-pass" placeholder="Digite a senha secreta...">
        <button class="btn" onclick="verificarSenha()">ENTRAR</button>
    </div>

    <div id="admin-content" class="card">
        <h3>Painel NetBase</h3>
        <input type="text" id="db-name" placeholder="Nome do Banco de Dados...">
        <button class="btn" onclick="criarBanco()">GERAR API DE BANCO</button>
        <div id="api-list"></div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <button class="btn" style="background: #444;" onclick="sair()">SAIR</button>
    </div>

    <script>
        const X_MASTER_KEY = "SUA_MASTER_KEY_AQUI"; // Coloque sua chave do JSONbin aqui
        const SENHA_CORRETA = "netchaveapi";

        // Verifica se já estava logado
        if(sessionStorage.getItem('logado') === 'true') {
            mostrarPainel();
        }

        function verificarSenha() {
            const pass = document.getElementById('secret-pass').value;
            if(pass === SENHA_CORRETA) {
                sessionStorage.setItem('logado', 'true');
                mostrarPainel();
            } else {
                alert("Senha Incorreta!");
            }
        }

        function mostrarPainel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            renderizarLista();
        }

        function sair() {
            sessionStorage.removeItem('logado');
            location.reload();
        }

        async function criarBanco() {
            const nome = document.getElementById('db-name').value || "MeuBanco";
            const btn = document.querySelector('.btn');
            
            btn.innerText = "CRIANDO...";
            btn.disabled = true;

            try {
                const res = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': X_MASTER_KEY
                    },
                    body: JSON.stringify({ app: nome, created_at: new Date(), data: [] })
                });

                const data = await res.json();
                const novaAPI = { 
                    nome: nome, 
                    url: `https://api.jsonbin.io/v3/b/${data.metadata.id}` 
                };

                // Salva no histórico local
                let historico = JSON.parse(localStorage.getItem('netbase_apis') || '[]');
                historico.push(novaAPI);
                localStorage.setItem('netbase_apis', JSON.stringify(historico));

                renderizarLista();
                document.getElementById('db-name').value = "";
            } catch (err) {
                alert("Erro ao conectar com JSONbin. Verifique sua Master Key.");
            } finally {
                btn.innerText = "GERAR API DE BANCO";
                btn.disabled = false;
            }
        }

        function renderizarLista() {
            const list = document.getElementById('api-list');
            const historico = JSON.parse(localStorage.getItem('netbase_apis') || '[]');
            list.innerHTML = historico.map(api => `
                <div class="api-item">
                    <b>📦 ${api.nome}</b><br>
                    <small>${api.url}</small>
                </div>
            `).reverse().join('');
        }
    </script>
</body>
</html>
