<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NetBase</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input, .btn { padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #800080; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-screen" class="card">
        <input type="password" id="secret-pass" placeholder="Senha...">
        <button class="btn" onclick="verificar()">ENTRAR</button>
    </div>
    <div id="admin-content" class="card" style="display:none;">
        <input type="text" id="db-name" placeholder="Nome do banco...">
        <button class="btn" onclick="criarBanco()">GERAR API DE BANCO</button>
        <div id="api-list"></div>
    </div>

    <script>
        const KEY = "$2a$10$.Y/7iKOT314ACeDErCmKHOd2voGj1NSJ0fD1QMQcCDB8.WdyAT8LC";
        const BIN_ID = "69b4a54aaa77b81da9e1eebf";

        function verificar() {
            if(document.getElementById('secret-pass').value === "netchaveapi") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                carregar();
            }
        }

        async function carregar() {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Master-Key': KEY} });
            const json = await res.json();
            const lista = json.record && json.record.bancos ? json.record.bancos : [];
            document.getElementById('api-list').innerHTML = lista.map(b => `<p>${b.nome}: ${b.url}</p>`).join('');
        }

        async function criarBanco() {
            const nome = document.getElementById('db-name').value || "Novo";
            // Cria o bin individual
            const res = await fetch('https://api.jsonbin.io/v3/b', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-Master-Key': KEY, 'X-Bin-Private': 'true'},
                body: JSON.stringify({ app: nome })
            });
            const data = await res.json();
            const id = data.metadata.id;
            
            // Adiciona na lista mestra
            const resGet = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Master-Key': KEY} });
            const json = await resGet.json();
            let lista = json.record && json.record.bancos ? json.record.bancos : [];
            lista.push({nome: nome, url: `https://api.jsonbin.io/v3/b/${id}`});

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json', 'X-Master-Key': KEY},
                body: JSON.stringify({bancos: lista})
            });
            alert("Sucesso!");
            carregar();
        }
    </script>
</body>
</html>
