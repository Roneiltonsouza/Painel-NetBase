<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NetBase Cloud</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 400px; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #800080; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h3>Login NetBase</h3>
        <input type="password" id="senha-acesso" placeholder="Digite a senha...">
        <button onclick="entrar()">ENTRAR</button>
    </div>

    <div id="painel" class="box" style="display:none;">
        <h3>Painel Gerador</h3>
        <input type="text" id="api-nome" placeholder="Nome da API">
        <button onclick="salvar()">GERAR E SALVAR API</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxWpIfwe1Iy90ss2IaTo8Ih38vmoa3iYk",
            authDomain: "netbase-cloud.firebaseapp.com",
            databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com",
            projectId: "netbase-cloud",
            storageBucket: "netbase-cloud.firebasestorage.app",
            messagingSenderId: "600974870892",
            appId: "1:600974870892:web:626b717468391f197a0b49",
            measurementId: "G-MQNP2MP3FS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // A ÚNICA SENHA
        const SENHA_UNICA = "netchaveapi"; 

        window.entrar = () => {
            const senha = document.getElementById('senha-acesso').value;
            if(senha === SENHA_UNICA) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
            } else {
                alert("Senha incorreta!");
            }
        };

        window.salvar = () => {
            const apiNome = document.getElementById('api-nome').value;
            if(!apiNome) return alert("Preencha o nome!");
            
            push(ref(db, 'apis/'), { nome: apiNome }).then(() => {
                alert("API Gerada!");
                document.getElementById('api-nome').value = "";
            });
        };
    </script>
</body>
</html>
