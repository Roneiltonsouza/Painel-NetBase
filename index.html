<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NetBase Cloud - Completo</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 400px; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #800080; color: #fff; font-weight: bold; cursor: pointer; }
        .item { background: #222; padding: 10px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-acao { width: auto; padding: 5px 10px; font-size: 12px; margin-left: 5px; }
        .btn-del { background: #ff4444; }
        .btn-copy { background: #444; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h3>Login NetBase</h3>
        <input type="password" id="senha-acesso" placeholder="Senha única...">
        <button onclick="entrar()">ENTRAR</button>
    </div>

    <div id="painel" class="box" style="display:none;">
        <h3>Suas APIs</h3>
        <input type="text" id="api-nome" placeholder="Cole o nome ou API aqui...">
        <button onclick="salvar()">SALVAR NOVA API</button>
        <div id="lista-apis"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxWpIfwe1Iy90ss2IaTo8Ih38vmoa3iYk",
            authDomain: "netbase-cloud.firebaseapp.com",
            databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com",
            projectId: "netbase-cloud",
            storageBucket: "netbase-cloud.firebasestorage.app",
            messagingSenderId: "600974870892",
            appId: "1:600974870892:web:626b717468391f197a0b49",
            measurementId: "G-MQNP2MP3FS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LOGIN
        window.entrar = () => {
            if(document.getElementById('senha-acesso').value === "netchaveapi") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                carregarLista();
            } else { alert("Senha incorreta!"); }
        };

        // SALVAR
        window.salvar = () => {
            const nome = document.getElementById('api-nome').value;
            if(!nome) return;
            push(ref(db, 'apis/'), { nome: nome });
            document.getElementById('api-nome').value = "";
        };

        // COPIAR
        window.copiar = (texto) => {
            navigator.clipboard.writeText(texto);
            alert("API copiada!");
        };

        // EXCLUIR
        window.excluir = (id) => {
            if(confirm("Excluir esta API?")) {
                remove(ref(db, 'apis/' + id));
            }
        };

        // LISTAR EM TEMPO REAL
        function carregarLista() {
            onValue(ref(db, 'apis/'), (snapshot) => {
                const lista = document.getElementById('lista-apis');
                lista.innerHTML = "";
                snapshot.forEach((child) => {
                    lista.innerHTML += `<div class="item">
                        <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${child.val().nome}</span>
                        <div>
                            <button class="btn-acao btn-copy" onclick="copiar('${child.val().nome}')">COPIAR</button>
                            <button class="btn-acao btn-del" onclick="excluir('${child.key}')">X</button>
                        </div>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
