<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NetBase Cloud - Gerador de IDs</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 10px; }
        .box { width: 100%; max-width: 480px; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 25px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-size: 15px; }
        
        button { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-add { background: #800080; min-width: 60px; font-size: 20px; }
        .btn-add:hover { background: #a020f0; }
        
        /* Itens da Lista */
        .item-container { background: #1a1a1a; padding: 15px; margin-top: 15px; border-radius: 10px; border-left: 5px solid #800080; }
        .id-display { background: #000; padding: 8px; border-radius: 5px; font-family: monospace; font-size: 12px; color: #00ff00; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px dashed #333; }
        
        .edit-group { display: flex; gap: 8px; }
        .btn-save-edit { background: #28a745; flex: 1; }
        .btn-copy-id { background: #444; font-size: 11px; padding: 5px 8px; }
        .btn-del { background: #ff4444; }
        
        h3 { margin-top: 0; color: #800080; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="login-box" class="box" style="text-align: center;">
        <h3>Acesso Restrito</h3>
        <input type="password" id="senha-acesso" placeholder="Digite sua netchaveapi...">
        <button onclick="entrar()" style="width: 100%; margin-top: 15px; background: #800080; font-size: 16px;">ACESSAR PAINEL</button>
    </div>

    <div id="painel" class="box" style="display:none;">
        <h3>NetBase Cloud ID</h3>
        
        <div class="input-group">
            <input type="text" id="api-nome" placeholder="Nome do novo projeto/API...">
            <button class="btn-add" onclick="salvar()">+</button>
        </div>

        <div id="lista-apis"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxWpIfwe1Iy90ss2IaTo8Ih38vmoa3iYk",
            authDomain: "netbase-cloud.firebaseapp.com",
            databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com",
            projectId: "netbase-cloud",
            storageBucket: "netbase-cloud.firebasestorage.app",
            messagingSenderId: "600974870892",
            appId: "1:600974870892:web:626b717468391f197a0b49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Função para gerar o ID no padrão AIza
        function gerarChaveAIza() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let random = '';
            for (let i = 0; i < 35; i++) {
                random += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return "AIza" + random;
        }

        window.entrar = () => {
            if(document.getElementById('senha-acesso').value === "netchaveapi") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                carregarLista();
            } else { alert("Senha incorreta!"); }
        };

        window.salvar = () => {
            const input = document.getElementById('api-nome');
            if(!input.value) return;
            
            // Gera o ID novo começando com AIza
            const novoID = gerarChaveAIza();
            set(ref(db, 'apis/' + novoID), { nome: input.value });
            
            input.value = "";
            alert("Nova API gerada com sucesso!");
        };

        window.atualizarAPI = (id) => {
            const novoNome = document.getElementById('edit-'+id).value;
            if(!novoNome) return;
            update(ref(db, 'apis/' + id), { nome: novoNome });
            alert("Nome atualizado!");
        };

        window.copiarID = (id) => {
            navigator.clipboard.writeText(id);
            alert("ID Copiado: " + id);
        };

        window.excluir = (id) => {
            if(confirm("Apagar permanentemente?")) remove(ref(db, 'apis/' + id));
        };

        function carregarLista() {
            onValue(ref(db, 'apis/'), (snapshot) => {
                const lista = document.getElementById('lista-apis');
                lista.innerHTML = "";
                snapshot.forEach((child) => {
                    const idReal = child.key;
                    const nomeAtual = child.val().nome;
                    lista.innerHTML += `
                        <div class="item-container">
                            <div class="id-display">
                                <span style="font-size: 10px;">${idReal}</span>
                                <button class="btn-copy-id" onclick="copiarID('${idReal}')">COPIAR ID</button>
                            </div>
                            <div class="edit-group">
                                <input type="text" id="edit-${idReal}" value="${nomeAtual}">
                                <button class="btn-save-edit" onclick="atualizarAPI('${idReal}')">SALVAR</button>
                                <button class="btn-del" onclick="excluir('${idReal}')">X</button>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
