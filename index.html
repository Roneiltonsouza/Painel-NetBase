<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBase Painel</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #333; }
        h2 { color: #a020f0; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #a020f0; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #api-list { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .item { background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-radius: 4px; border-left: 4px solid #a020f0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card">
        <h2>NetBase Cloud</h2>
        <input type="text" id="nome" placeholder="Nome do Banco...">
        <input type="text" id="url" placeholder="URL ou Link...">
        <button class="btn" onclick="enviar()">GERAR E SALVAR API</button>
        <div id="api-list">Sincronizando...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            appId: "1:1032476157217:web:5539feae0ea17b71150a60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Função de Envio
        window.enviar = function() {
            const nome = document.getElementById('nome').value;
            const url = document.getElementById('url').value;
            if(!nome || !url) return alert("Preencha os campos!");

            const listaRef = ref(db, 'bancos');
            const novoBancoRef = push(listaRef);
            set(novoBancoRef, { nome, url, data: new Date().toLocaleString() })
                .then(() => {
                    document.getElementById('nome').value = "";
                    document.getElementById('url').value = "";
                });
        };

        // Escuta em tempo real
        onValue(ref(db, 'bancos'), (snapshot) => {
            const dados = snapshot.val();
            const listDiv = document.getElementById('api-list');
            if(!dados) { listDiv.innerHTML = "Nenhum banco na nuvem."; return; }
            
            listDiv.innerHTML = Object.values(dados).map(b => `
                <div class="item">
                    <b>${b.nome}</b><br>
                    <small>${b.url}</small>
                </div>
            `).reverse().join('');
        });
    </script>
</body>
</html>
