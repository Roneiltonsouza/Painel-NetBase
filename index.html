<div id="login-box">
    <h2>Login NetBase</h2>
    <input type="password" id="pass" placeholder="Digite sua senha...">
    <button class="btn" onclick="entrar()">ENTRAR</button>
</div>

<div id="admin-content" style="display:none;">
    <input type="text" id="db-name" placeholder="Nome do banco">
    <input type="text" id="db-url" placeholder="URL">
    <button class="btn" onclick="salvarBanco()">SALVAR NO FIREBASE</button>
</div>

<script type="module">
    // ... suas importações aqui ...
    
    // FUNÇÃO DE LOGIN
    window.entrar = function() {
        const senha = document.getElementById('pass').value;
        if(senha === "netchaveapi") { // <-- Sua senha original aqui
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
        } else {
            alert("Senha incorreta!");
        }
    };

    // FUNÇÃO DE SALVAR (Só funciona após o login)
    window.salvarBanco = function() {
        const nome = document.getElementById('db-name').value;
        const url = document.getElementById('db-url').value;
        if(!nome || !url) return alert("Preencha tudo!");
        
        const novoRef = push(ref(db, 'bancos/'));
        set(novoRef, { nome, url }).then(() => {
            alert("Salvo com sucesso!");
        });
    };
</script>
